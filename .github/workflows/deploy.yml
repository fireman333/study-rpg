name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

# Opt in to Node.js 24 runtime for JavaScript actions ahead of 2026-06-02
# forced switch (silences deprecation warnings; v4 actions internally targeted
# Node 20 which is removed 2026-09-16). Bump action versions later when v5+
# of each is widely adopted.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build app
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          # VITE_APP_VERSION is read from package.json `version` via process.env.npm_package_version
          # inside vite.config.ts when running through pnpm. VITE_COMMIT_SHA carries the git SHA.
          VITE_COMMIT_SHA: ${{ github.sha }}
          VITE_CLOUD_SYNC_ENABLED: 'true'
        run: pnpm --filter @study-rpg/medexam-tw build

      - name: Build 二階 app
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_COMMIT_SHA: ${{ github.sha }}
          VITE_CLOUD_SYNC_ENABLED: 'true'
        run: pnpm --filter @study-rpg/medexam2-hospital-tw build

      - name: Merge 二階 dist into 一階 dist subpath
        run: |
          mkdir -p apps/medexam-tw/dist/hospital
          cp -r apps/medexam2-hospital-tw/dist/. apps/medexam-tw/dist/hospital/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/medexam-tw/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

# OpenSpec config.yaml — generated by /spec init
# Curator-mode rules + project defaults. Manually maintain after init.
# Reference: https://github.com/Fission-AI/OpenSpec

# Inject project.md content into every artifact-generation prompt
# so OpenSpec AI sees Purpose / Stack / Constraints automatically.
context:
  project_md: openspec/project.md

# Hard rules enforced on every /opsx:* invocation.
rules:
  # === Curator philosophy ===
  - id: no-auto-commit
    rule: "Never run `git commit` automatically. All commits go through the user via the auto-git skill or explicit confirmation."
  - id: ask-on-non-trivial
    rule: "For any non-trivial decision (architecture, library choice, naming convention, scope cut), use AskUserQuestion before writing it into a proposal/spec."

  # === Workflow integrity ===
  - id: no-skip-propose
    rule: "Do not implement code changes without first running /opsx:propose for the change. The propose -> apply -> verify -> archive sequence is mandatory for any change touching openspec/specs/."
  - id: no-archive-without-verify
    rule: "Do not archive a change before /opsx:verify reports green on completeness/correctness/coherence."

  # === study-rpg specific ===
  - id: pluggable-api-stability
    rule: "Engine API surface (ContentPack / ThemePack / Question / Subject / Item interfaces in packages/core/src/types.ts) is the contract for third-party forks. Treat any breaking change to these types as MAJOR and require a CHANGELOG entry."
  - id: no-medical-hardcode-in-engine
    rule: "packages/core/ must remain content-agnostic. Medical terms (科目, 知識力, 白袍 etc.) belong in packages/theme-pixel-medical/ or packages/content-medexam-tw/, never in core."
  - id: gacha-no-payment
    rule: "All loot rolls must be triggered by gameplay actions (read time / quiz / boss). Do not introduce IAP, real-money, ad-rewards, or any monetary path to rolls — this is a hard product principle, not just a roadmap item."
  - id: yangming-attribution
    rule: "Every Question card UI must display 陽明國考考古題小組 attribution + source URL inline. Removing this requires written permission from the source; default is to keep it."
  - id: phi-zero-tolerance
    rule: "Never write real patient identifiers into openspec/. (Not applicable here since content is past exam questions, but rule kept for forks that might add clinical case content packs.)"

  # === Project-specific retreats ===
  - id: retreat-research-plan
    rule: "If project contains research_plan.json at root, halt OpenSpec workflow and suggest /research-plan instead."
  - id: retreat-meta-analysis
    rule: "If project contains 01_protocol/ + 09_qa/ at root, halt and suggest /ma-end-to-end."

# Project defaults
defaults:
  requirement_keyword: SHALL
  scenario_format: bdd
  capability_slug_case: kebab
  change_slug_pattern: "<verb>-<object>"

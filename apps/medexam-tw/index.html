<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>一階國考 RPG</title>
    <meta name="description" content="像素風養成型遊戲，準備台灣一階醫師國考。閱讀累積經驗，寫考古題打 boss，抽卡獲得裝備。" />
    <link rel="preload" href="/study-rpg/fonts/Cubic_11.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" />
    <script>
      // SPA route restore for GitHub Pages — pairs with public/404.html
      // (rafgraph/spa-github-pages). Must run synchronously BEFORE main.tsx
      // so React Router boots with the clean pathname.
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function (s) {
            return s.replace(/~and~/g, '&');
          }).join('?');
          window.history.replaceState(null, '', l.pathname.slice(0, -1) + decoded + l.hash);
        }
      })(window.location);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

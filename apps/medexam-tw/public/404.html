<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <title>一階國考 RPG</title>
    <script>
      // Single Page Apps for GitHub Pages — MIT License
      // https://github.com/rafgraph/spa-github-pages
      // Encodes the requested path into a query string and redirects to
      // index.html, where the inline restore script in <head> rewrites
      // history back to the clean URL before React Router boots.
      var pathSegmentsToKeep = 1; // matches vite.config.ts base: '/study-rpg/'
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
